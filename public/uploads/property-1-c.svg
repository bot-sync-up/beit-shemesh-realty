<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice"><defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CFE3F5"/>
      <stop offset="1" stop-color="#9EC0DC"/>
    </linearGradient>
    <linearGradient id="wallG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF1F2"/>
      <stop offset="1" stop-color="#EAF1F2" stop-opacity="0.85"/>
    </linearGradient>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="white" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1600" height="800" fill="url(#sky)"/>
  <rect width="1600" height="800" fill="url(#dots)"/>
    <rect width="1600" height="800" fill="#EAF1F2"/>
    <rect width="1600" height="800" fill="url(#dots)"/>
    <rect x="0" y="600" width="1600" height="200" fill="#5A6B66" opacity="0.15"/>
    <!-- upper cabinets -->
    <rect x="200" y="200" width="1200" height="160" fill="#0F6E56" opacity="0.85"/>
    <line x1="500" y1="200" x2="500" y2="360" stroke="#EAF1F2" stroke-width="4"/>
    <line x1="800" y1="200" x2="800" y2="360" stroke="#EAF1F2" stroke-width="4"/>
    <line x1="1100" y1="200" x2="1100" y2="360" stroke="#EAF1F2" stroke-width="4"/>
    <!-- countertop -->
    <rect x="180" y="460" width="1240" height="20" fill="#5A6B66"/>
    <!-- lower cabinets -->
    <rect x="200" y="480" width="1200" height="180" fill="#EAF1F2" opacity="0.95" stroke="#5A6B66" stroke-width="3"/>
    <line x1="500" y1="480" x2="500" y2="660" stroke="#5A6B66" stroke-width="3"/>
    <line x1="800" y1="480" x2="800" y2="660" stroke="#5A6B66" stroke-width="3"/>
    <line x1="1100" y1="480" x2="1100" y2="660" stroke="#5A6B66" stroke-width="3"/>
    <!-- sink -->
    <rect x="600" y="468" width="200" height="20" fill="#0F6E56"/>
    <circle cx="700" cy="478" r="8" fill="#EF9F27"/>
    <!-- pendant lights -->
    <line x1="450" y1="200" x2="450" y2="120" stroke="#5A6B66" stroke-width="3"/>
    <circle cx="450" cy="220" r="20" fill="#EF9F27"/>
    <line x1="850" y1="200" x2="850" y2="120" stroke="#5A6B66" stroke-width="3"/>
    <circle cx="850" cy="220" r="20" fill="#EF9F27"/>
    <line x1="1250" y1="200" x2="1250" y2="120" stroke="#5A6B66" stroke-width="3"/>
    <circle cx="1250" cy="220" r="20" fill="#EF9F27"/>
  </svg>
