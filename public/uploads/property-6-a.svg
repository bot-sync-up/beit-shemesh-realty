<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice"><defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DBEFE2"/>
      <stop offset="1" stop-color="#9BD2A8"/>
    </linearGradient>
    <linearGradient id="wallG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F1F7F4"/>
      <stop offset="1" stop-color="#F1F7F4" stop-opacity="0.85"/>
    </linearGradient>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="white" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1600" height="800" fill="url(#sky)"/>
  <rect width="1600" height="800" fill="url(#dots)"/>
    <rect x="0" y="640" width="1600" height="160" fill="#1D9E75" opacity="0.85"/>
   <rect x="0" y="640" width="1600" height="160" fill="url(#dots)"/>
    
  <circle cx="1300" cy="180" r="70" fill="#EF9F27" opacity="0.55"/>
  <circle cx="1300" cy="180" r="44" fill="#EF9F27" opacity="0.9"/>

    <rect x="380" y="380" width="840" height="260" fill="url(#wallG)"/>
    <rect x="380" y="380" width="840" height="40" fill="#094534"/>
    <!-- awning -->
    <path d="M 360 440 L 1240 440 L 1200 480 L 400 480 Z" fill="#EF9F27" opacity="0.9"/>
    <!-- shop window -->
    <rect x="430" y="490" width="340" height="150" fill="#0F6E56" opacity="0.55"/>
    <line x1="600" y1="490" x2="600" y2="640" stroke="#F1F7F4" stroke-width="4"/>
    <!-- door -->
    <rect x="820" y="490" width="120" height="150" fill="#094534" opacity="0.85"/>
    <circle cx="920" cy="565" r="4" fill="#EF9F27"/>
    <!-- right shop window -->
    <rect x="980" y="490" width="220" height="150" fill="#0F6E56" opacity="0.45"/>
    <!-- pedestrians -->
    <circle cx="320" cy="600" r="14" fill="#094534" opacity="0.7"/>
    <rect x="307" y="608" width="26" height="40" fill="#094534" opacity="0.7"/>
